name: Build and Release Workflow

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Alfred Workflow
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x build.sh recent_projects.py open_in_editor.sh

      - name: Build package
        run: ./build.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: alfred-vscode-cursor-recents
          path: alfred-vscode-cursor-recents.alfredworkflow

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: chmod +x build.sh recent_projects.py open_in_editor.sh

      - name: Build package
        run: ./build.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: alfred-vscode-cursor-recents.alfredworkflow
          generate_release_notes: true
